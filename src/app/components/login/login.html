<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE-edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Admin</title>
  <link rel="stylesheet" href="login.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
<div class="wrapper">
  <h1>Login</h1>
  @if (errorMessage()) {
    <p> {{ errorMessage() }}</p>
  }
  <div class="input-box">
    <input [(ngModel)]="username" name="username" placeholder="Enter username here..." required>
    <i class="bx bxs-user"></i>
  </div>
  <div class="input-box">
    <input [(ngModel)]="email" name="email" placeholder="Enter email here....">
    <i class="bx bx-envelope"></i>
  </div>
  <div class="input-box">
    <input [(ngModel)]="password" name="password" type="password" placeholder="Enter password here...">
    <i class="bx bxs-lock-alt"></i>
  </div>
  <button class="login-button" (click)="login()">Login</button>
</div>
</body>

</html>
