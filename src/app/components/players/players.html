<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th>Username</th>
        <th>Email</th>
      </tr>
    </thead>
    <tbody>
    @for (player of players(); track player) {
      <tr>
        <td>{{player.username}}</td>
        <td>{{player.email}}</td>
      </tr>
    }
    </tbody>
  </table>
</div>
@if (show()) {
  <div class="error-message">
  {{ error() }}
  </div>
}
